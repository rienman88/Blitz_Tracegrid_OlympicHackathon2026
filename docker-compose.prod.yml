services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/certbot-www:/var/www/certbot:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped

  backend:
    image: ${IMAGE_NAMESPACE:-tracegrid}/tracegrid-backend:${IMAGE_TAG:-latest}
    build:
      context: ./backend
    environment:
      FEATHERLESS_API_KEY: ${FEATHERLESS_API_KEY:-}
      FEATHERLESS_MODEL: ${FEATHERLESS_MODEL:-Qwen/Qwen3-Coder-30B-A3B-Instruct}
      FEATHERLESS_BASE_URL: ${FEATHERLESS_BASE_URL:-https://api.featherless.ai/v1}
      FEATHERLESS_TIMEOUT_SECONDS: ${FEATHERLESS_TIMEOUT_SECONDS:-2.8}
      TRACEGRID_LIVE_AGENT: ${TRACEGRID_LIVE_AGENT:-none}
      ALLOW_GITHUB_INGESTION: ${ALLOW_GITHUB_INGESTION:-true}
      GITHUB_CLONE_TIMEOUT_SECONDS: ${GITHUB_CLONE_TIMEOUT_SECONDS:-25}
      SPEECHMATICS_API_KEY: ${SPEECHMATICS_API_KEY:-}
      SPEECHMATICS_MP_URL: ${SPEECHMATICS_MP_URL:-https://mp.speechmatics.com}
      SPEECHMATICS_JWT_TTL_SECONDS: ${SPEECHMATICS_JWT_TTL_SECONDS:-60}
      SPEECHMATICS_RT_URL: ${SPEECHMATICS_RT_URL:-wss://eu2.rt.speechmatics.com/v2}
      SPEECHMATICS_AUTH_QUERY: ${SPEECHMATICS_AUTH_QUERY:-jwt}
      SPEECHMATICS_LANGUAGE: ${SPEECHMATICS_LANGUAGE:-en}
      SPEECHMATICS_OPERATING_POINT: ${SPEECHMATICS_OPERATING_POINT:-enhanced}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    depends_on:
      neo4j:
        condition: service_started
      redis:
        condition: service_started
    restart: unless-stopped

  frontend:
    image: ${IMAGE_NAMESPACE:-tracegrid}/tracegrid-frontend:${IMAGE_TAG:-latest}
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
        NEXT_PUBLIC_WS_BASE_URL: ${NEXT_PUBLIC_WS_BASE_URL:-}
        NEXT_PUBLIC_API_TIMEOUT_MS: ${NEXT_PUBLIC_API_TIMEOUT_MS:-6500}
        NEXT_PUBLIC_REPOSITORY_API_TIMEOUT_MS: ${NEXT_PUBLIC_REPOSITORY_API_TIMEOUT_MS:-45000}
        NEXT_PUBLIC_TRACEGRID_VERSION: ${NEXT_PUBLIC_TRACEGRID_VERSION:-hackathon}
        NEXT_PUBLIC_GIT_SHA: ${NEXT_PUBLIC_GIT_SHA:-local}
        NEXT_PUBLIC_BUILD_TIME: ${NEXT_PUBLIC_BUILD_TIME:-dev-build}
        INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL:-http://backend:8000}
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL:-http://backend:8000}
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/password}
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  neo4j_data:
  redis_data:
